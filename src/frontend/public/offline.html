<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Task Turtle</title>
  <meta name="theme-color" content="#00ff88" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 20px;
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    .glow-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #00ff88 0%, #00cc6e 50%, #000 100%);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.5), 0 0 80px rgba(0, 255, 136, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.5), 0 0 80px rgba(0, 255, 136, 0.2); }
      50% { box-shadow: 0 0 60px rgba(0, 255, 136, 0.8), 0 0 120px rgba(0, 255, 136, 0.4); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #00ff88;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #ff4444;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .retry-btn {
      background: linear-gradient(135deg, #00ff88, #00cc6e);
      color: #000;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .retry-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    .retry-btn:active { transform: scale(0.98); }
    .brand {
      position: absolute;
      bottom: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="glow-circle">🐢</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <div class="status">
    <div class="dot"></div>
    <span>Waiting for connection...</span>
  </div>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <div class="brand">Task Turtle &mdash; Smart Task Marketplace</div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
